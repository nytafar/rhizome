<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <style>
      .stem { stroke: #ffffff; stroke-width: 2.4; stroke-linecap: round; fill: none; }
      .stem-thick { stroke: #ffffff; stroke-width: 3.2; stroke-linecap: round; fill: none; }
      .node { fill: #ffffff; }
      .node-ring { stroke: #ffffff; stroke-width: 2; fill: none; }
      .tendril { stroke: #ffffff; stroke-width: 1.4; stroke-linecap: round; fill: none; opacity: 0.6; }
      .micro { fill: #ffffff; opacity: 0.5; }
    </style>
  </defs>

  <!--
    Rhizome: A living network radiating from a dense core.
    No single root. No hierarchy. Nodes connected to nodes.
    Organic geometry — Obsidian-grade minimalism meets botanical growth.
  -->

  <!-- Primary structural connections (thick stems) -->
  <!-- Core cluster → upper-left branch -->
  <path class="stem-thick" d="M 256,258 C 238,240 210,228 188,210" />
  <path class="stem-thick" d="M 188,210 C 168,192 148,178 128,168" />

  <!-- Core → upper-right branch -->
